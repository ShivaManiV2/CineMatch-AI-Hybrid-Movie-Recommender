<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movie Recommender</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
      background: #f8f9fa; 
      padding-top: 50px; 
    }
    .container { max-width: 700px; }
    h1 { text-align: center; margin-bottom: 30px; }
    table th { background-color: #343a40; color: #fff; }
    table td, table th { text-align: center; }
    #recs { margin-top: 20px; }
  </style>
</head>
<body>

<div class="container">
  <h1>🎬 Movie Recommender</h1>

  <div class="mb-3">
    <label for="user_id" class="form-label">User ID</label>
    <input type="number" class="form-control" id="user_id" placeholder="Enter User ID">
  </div>

  <div class="mb-3">
    <label for="k" class="form-label">Number of Recommendations</label>
    <input type="number" class="form-control" id="k" value="10">
  </div>

  <div class="d-grid mb-4">
    <button class="btn btn-primary btn-lg" onclick="getRecommendations()">Get Recommendations</button>
  </div>

  <div id="recs"></div>
</div>

<!-- Bootstrap JS + Popper -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
async function getRecommendations() {
  const userId = document.getElementById('user_id').value;
  const k = document.getElementById('k').value;

  if (!userId) {
    alert('Please enter a user ID');
    return;
  }

  const recsDiv = document.getElementById('recs');
  recsDiv.innerHTML = '<p class="text-info">Loading recommendations...</p>';

  try {
    const response = await fetch('/recommend', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user_id: parseInt(userId), k: parseInt(k) })
    });

    if (!response.ok) {
      throw new Error(`Server error: ${response.status}`);
    }

    const data = await response.json();
    if (!data.recs || data.recs.length === 0) {
      recsDiv.innerHTML = '<p class="text-danger">No recommendations found.</p>';
      return;
    }

    let html = '<h2 class="mt-4">Top Recommendations</h2>';
    html += '<table class="table table-striped table-bordered mt-2">';
    html += '<thead><tr><th>Movie ID</th><th>Score</th></tr></thead><tbody>';

    data.recs.forEach(r => {
      html += `<tr><td>${r.movieId}</td><td>${r.score.toFixed(3)}</td></tr>`;
    });

    html += '</tbody></table>';
    recsDiv.innerHTML = html;

  } catch (err) {
    recsDiv.innerHTML = `<p class="text-danger">Error: ${err.message}</p>`;
  }
}
</script>

</body>
</html>
